name: Release Windows Build

on:
  push:
    tags:
      - "v*"
      - "windows"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label used for the packaged ZIP"
        required: false
        default: "manual"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout plugin repository
        uses: actions/checkout@v4

      - name: Prepare release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -eq "windows") {
            "artifact_base=deepfilter-vst-windows-x86_64" >> $env:GITHUB_OUTPUT
            "release_name=v1.0.0-deepfilter-vst3-windows" >> $env:GITHUB_OUTPUT
          } else {
            $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } elseif ("${{ github.event.inputs.version }}" -ne "") { "${{ github.event.inputs.version }}" } else { "manual" }
            "artifact_base=DeepFilterNet3-VST3-Win-$version-windows-x86_64" >> $env:GITHUB_OUTPUT
            "release_name=$version" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout DeepFilterNet dependency
        shell: pwsh
        run: git clone --depth 1 https://github.com/Rikorose/DeepFilterNet.git ../DeepFilterNet

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

      - name: Build bundled plugins
        run: cargo xtask bundle deepfilter-vst --release

      - name: Package release assets
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } elseif ("${{ github.event.inputs.version }}" -ne "") { "${{ github.event.inputs.version }}" } else { "manual" }
          ./scripts/package-release.ps1 -Version $version -ArtifactBase "${{ steps.meta.outputs.artifact_base }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepfilter-vst-windows
          path: |
            dist/*.zip
            dist/*.sha256

      - name: Publish GitHub release assets
        if: github.ref_type == 'tag' && github.ref_name != 'windows'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.release_name }}
          files: |
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true

      - name: Publish Windows 1.0 channel release
        if: github.ref_type == 'tag' && github.ref_name == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.release_name }}
          body_path: .github/release-body-windows.md
          files: |
            dist/*.zip
            dist/*.sha256
